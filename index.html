<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="manifest.json" />

  <title>Daily Brief</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: rgba(255,255,255,0.07);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --radius: 12px;
      --irish-bg: #0d2818; --irish-text: #3fb950;
      --world-bg: #0d1f3c; --world-text: #58a6ff;
      --politics-bg: #1e0f3c; --politics-text: #bc8cff;
      --econ-bg: #2d1a00; --econ-text: #d29922;
      --finance-bg: #0d2a2a; --finance-text: #39d353;
      --moldova-bg: #2a0d1a; --moldova-text: #f78166;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

    /* HEADER */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 16px 0; padding-top: calc(14px + env(safe-area-inset-top)); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .app-title { font-size: 19px; font-weight: 700; }
    .app-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: color 0.2s; }
    .refresh-btn:hover { color: var(--text); }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TABS */
    .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 8px 12px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; font-family: inherit; white-space: nowrap; transition: color 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* MAIN LAYOUT */
    .main { padding: 12px 14px; }

    /* DASHBOARD */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .widget { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
    .widget.wide { grid-column: 1 / -1; }
    .widget-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .widget-main { font-size: 22px; font-weight: 700; line-height: 1.1; }
    .widget-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* WEATHER */
    .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .weather-loc { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .weather-temp { font-size: 26px; font-weight: 700; }
    .weather-desc { font-size: 12px; color: var(--muted); }
    .weather-row { display: flex; gap: 10px; margin-top: 6px; font-size: 11px; color: var(--muted); }
    .weather-hour { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; }
    .weather-hour-time { color: var(--muted); }
    .weather-hour-temp { font-weight: 600; }
    .weather-hours { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .weather-hours::-webkit-scrollbar { display: none; }

    /* ALERTS */
    .alert-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
    .alert-item:last-child { margin-bottom: 0; }
    .alert-yellow { background: rgba(210,153,34,0.15); border: 1px solid rgba(210,153,34,0.3); }
    .alert-orange { background: rgba(220,100,20,0.15); border: 1px solid rgba(220,100,20,0.3); }
    .alert-red { background: rgba(200,40,40,0.15); border: 1px solid rgba(200,40,40,0.3); }
    .alert-none { color: var(--muted); font-size: 13px; }

    /* MARKETS */
    .market-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .market-row:last-child { border-bottom: none; }
    .market-name { color: var(--muted); font-size: 12px; }
    .market-val { font-weight: 600; }
    .up { color: #3fb950; }
    .down { color: #f78166; }
    .flat { color: var(--muted); }

    /* POLLEN */
    .pollen-bar { height: 8px; border-radius: 4px; background: var(--surface2); margin: 6px 0; overflow: hidden; }
    .pollen-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .pollen-low { background: #3fb950; }
    .pollen-mod { background: #d29922; }
    .pollen-high { background: #f0883e; }
    .pollen-vhigh { background: #f78166; }

    /* NEWS SECTION */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin: 14px 0 8px; }
    .section-label:first-child { margin-top: 0; }

    /* ARTICLE */
    .article { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; overflow: hidden; transition: border-color 0.15s; }
    .article:hover { border-color: rgba(255,255,255,0.14); }
    .article.open { border-color: var(--accent); }
    .article-header { padding: 12px 13px; }
    .article-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.02em; }
    .badge-irish { background: var(--irish-bg); color: var(--irish-text); }
    .badge-world { background: var(--world-bg); color: var(--world-text); }
    .badge-politics { background: var(--politics-bg); color: var(--politics-text); }
    .badge-economics { background: var(--econ-bg); color: var(--econ-text); }
    .badge-finance { background: var(--finance-bg); color: var(--finance-text); }
    .badge-moldova { background: var(--moldova-bg); color: var(--moldova-text); }
    .article-source { font-size: 11px; color: var(--muted); font-weight: 500; }
    .article-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .article-title { font-size: 14px; font-weight: 600; line-height: 1.45; color: var(--text); }
    .chevron { margin-left: auto; color: var(--muted); font-size: 11px; transition: transform 0.2s; display: inline-block; }
    .article.open .chevron { transform: rotate(180deg); }
    .article-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .article.open .article-body { max-height: 500px; }
    .article-body-inner { padding: 0 13px 13px; border-top: 1px solid var(--border); padding-top: 11px; }
    .article-summary { font-size: 13px; line-height: 1.65; color: #9aa5b1; margin-bottom: 11px; }
    .read-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; padding: 6px 13px; background: rgba(88,166,255,0.1); border-radius: 7px; border: 1px solid rgba(88,166,255,0.2); }
    .read-link:hover { background: rgba(88,166,255,0.18); }

    /* STATES */
    .loading-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    .mini-loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    .error-state { text-align: center; padding: 30px 20px; }
    .error-msg { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .retry-btn { padding: 8px 20px; background: var(--accent); color: #0d1117; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

    /* INSTALL */
    .install-banner { margin: 0 0 12px; background: linear-gradient(135deg, #161b22, #0d1f3c); border: 1px solid rgba(88,166,255,0.25); border-radius: var(--radius); padding: 11px 13px; display: flex; align-items: center; gap: 10px; }
    .install-banner span { font-size: 12px; color: #9aa5b1; line-height: 1.4; flex: 1; }
    .install-banner strong { color: var(--text); }
    .install-btn { flex-shrink: 0; padding: 6px 12px; background: var(--accent); color: #0d1117; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .close-banner { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; }

    .wmo-icon { font-size: 20px; }
  </style>
</head>

const WMO = {
  0:"☀️ Clear", 1:"🌤️ Mainly clear", 2:"⛅ Partly cloudy", 3:"☁️ Overcast",
  45:"🌫️ Foggy", 48:"🌫️ Foggy", 51:"🌦️ Light drizzle", 53:"🌦️ Drizzle", 55:"🌧️ Heavy drizzle",
  61:"🌧️ Light rain", 63:"🌧️ Rain", 65:"🌧️ Heavy rain", 71:"❄️ Light snow", 73:"❄️ Snow", 75:"❄️ Heavy snow",
  80:"🌦️ Showers", 81:"🌧️ Showers", 82:"⛈️ Heavy showers", 95:"⛈️ Thunderstorm", 99:"⛈️ Thunderstorm"
};

// ── UTILS ────────────────────────────────────────────────────────────────────
function timeAgo(str) {
  if (!str) return "";
  const d = new Date(str); if (isNaN(d)) return "";
  const m = Math.floor((Date.now()-d)/60000);
  if (m < 2) return "just now"; if (m < 60) return m+"m ago";
  if (m < 1440) return Math.floor(m/60)+"h ago";
  return Math.floor(m/1440)+"d ago";
}
function clean(html) {
  if (!html) return "";
  return html.replace(/<[^>]*>/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<")
    .replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/&nbsp;/g," ").replace(/\s+/g," ").trim();
}
function wmo(code) { return WMO[code] || "🌡️"; }

// ── WEATHER ──────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon, label) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,uv_index&hourly=temperature_2m,weather_code,precipitation_probability&daily=uv_index_max&timezone=Europe/Dublin&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    const now = new Date();
    const hour = now.getHours();
    const hours = [];
    for (let i = hour+1; i <= hour+6 && i < 24; i++) {
      hours.push({ time: `${i}:00`, temp: Math.round(d.hourly.temperature_2m[i]), code: d.hourly.weather_code[i], rain: d.hourly.precipitation_probability[i] });
    }
    return { label, temp: Math.round(d.current.temperature_2m), code: d.current.weather_code, wind: Math.round(d.current.wind_speed_10m), humidity: d.current.relative_humidity_2m, uv: d.current.uv_index, hours };
  } catch(e) { return null; }
}

// ── POLLEN (Open-Meteo) ──────────────────────────────────────────────────────
async function fetchPollen() {
  try {
    const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=53.4&longitude=-7.3&current=grass_pollen,alder_pollen,birch_pollen&timezone=Europe/Dublin`;
    const r = await fetch(url);
    const d = await r.json();
    const grass = d.current?.grass_pollen ?? 0;
    const total = grass + (d.current?.alder_pollen ?? 0) + (d.current?.birch_pollen ?? 0);
    let level = "Low", cls = "pollen-low", pct = 15;
    if (total > 80) { level="Very High"; cls="pollen-vhigh"; pct=100; }
    else if (total > 50) { level="High"; cls="pollen-high"; pct=75; }
    else if (total > 20) { level="Moderate"; cls="pollen-mod"; pct=45; }
    return { level, cls, pct, grass: Math.round(grass) };
  } catch { return { level:"Unknown", cls:"pollen-low", pct:0, grass:0 }; }
}

// ── MET ÉIREANN ALERTS ───────────────────────────────────────────────────────
async function fetchAlerts() {
  try {
    const url = PROXY + encodeURIComponent("https://www.met.ie/Open_Data/json/warning_IRELAND.json");
    // Fallback: parse Met Éireann RSS
    const r2 = await fetch(PROXY + encodeURIComponent("https://www.met.ie/rss/") + "&count=5");
    const d = await r2.json();
    if (d.items) {
      return d.items.filter(i => /warning|alert|status/i.test(i.title)).slice(0,3).map(i => ({
        text: clean(i.title), level: /red/i.test(i.title) ? "red" : /orange/i.test(i.title) ? "orange" : "yellow"
      }));
    }
  } catch {}
  return [];
}

// ── NEWS FEEDS ───────────────────────────────────────────────────────────────
async function fetchFeed(feed) {
  try {
    const r = await fetch(PROXY + encodeURIComponent(feed.rss), { signal: AbortSignal.timeout(9000) });
    const d = await r.json();
    if (d.status !== "ok" || !d.items) return [];
    return d.items.map(item => ({
      title: clean(item.title || ""),
      summary: clean(item.description || item.content || "").slice(0, 340),
      link: item.link || "",
      date: item.pubDate || "",
      source: feed.name,
      cat: feed.cat,
    })).filter(a => a.title);
  } catch { return []; }
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function weatherWidget(w) {
  if (!w) return `<div style="color:var(--muted);font-size:12px">Unavailable</div>`;
  const wmoStr = wmo(w.code);
  const [icon, desc] = wmoStr.split(" ").length > 1 ? [wmoStr.split(" ")[0], wmoStr.split(" ").slice(1).join(" ")] : ["🌡️", wmoStr];
  const hoursHtml = w.hours.map(h => `
    <div class="weather-hour">
      <span class="weather-hour-time">${h.time}</span>
      <span>${wmo(h.code).split(" ")[0]}</span>
      <span class="weather-hour-temp">${h.temp}°</span>
      ${h.rain > 30 ? `<span style="color:#58a6ff;font-size:10px">${h.rain}%</span>` : ""}
    </div>`).join("");
  return `
    <div class="weather-loc">${w.label}</div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <span class="weather-temp">${w.temp}°C</span>
      <span style="font-size:20px">${icon}</span>
    </div>
    <div class="weather-desc">${desc}</div>
    <div class="weather-row">
      <span>💨 ${w.wind} km/h</span>
      <span>💧 ${w.humidity}%</span>
      <span>☀️ UV ${Math.round(w.uv||0)}</span>
    </div>
    <div class="weather-hours">${hoursHtml}</div>`;
}

function pollenWidget(p) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:center">

      <span style="font-size:20px">🌿</span>
    </div>
    <div class="pollen-bar"><div class="pollen-fill ${p.cls}" style="width:${p.pct}%"></div></div>
    <div style="font-size:11px;color:var(--muted)">Grass: ${p.grass} grains/m³</div>`;
}

function marketsWidget(m) {
  if (!m.length) return `<div style="color:var(--muted);font-size:12px">Market data unavailable</div>`;
  if (m[0]?.note) return `
    <div style="font-size:12px;color:var(--muted);line-height:1.6">
      To enable live markets, get a free API key at
      <a href="https://finnhub.io" target="_blank" style="color:var(--accent)">finnhub.io</a>
      (30 sec, no card), then paste it into the app code where it says
      <code style="background:var(--surface2);padding:1px 5px;border-radius:4px">PASTE_YOUR_FINNHUB_KEY_HERE</code>
    </div>`;
  return m.map(idx => `
    <div class="market-row">
      <span class="market-name">${idx.name}</span>
      <span class="market-val">${idx.value} <span class="${idx.up?'up':'down'}">${idx.up?'▲':'▼'} ${Math.abs(idx.change)}%</span></span>
    </div>`).join("");
}

function alertsWidget(alerts) {
  if (!alerts.length) return `<div class="alert-none">✅ No active weather warnings</div>`;
  return alerts.map(a => `<div class="alert-item alert-${a.level}">⚠️ ${a.text}</div>`).join("");
}

function articleHTML(a, uid) {
  const summary = a.summary.length > 10 ? a.summary + "…" : "No summary available.";
  return `
    <div class="article" id="art-${uid}" onclick="toggleArt('${uid}')">
      <div class="article-header">
        <div class="article-meta">
          <span class="badge ${BADGE_CLASS[a.cat]||''}">${a.cat.toUpperCase()}</span>
          <span class="article-source">${a.source}</span>
          <span class="article-time">${timeAgo(a.date)}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="article-title">${a.title}</div>
      </div>
      <div class="article-body">
        <div class="article-body-inner">
          <div class="article-summary">${summary}</div>
          ${a.link ? `<a class="read-link" href="${a.link}" target="_blank" onclick="event.stopPropagation()">Read full article →</a>` : ""}
        </div>
      </div>
    </div>`;
}

function toggleArt(uid) {
  document.getElementById("art-"+uid)?.classList.toggle("open");
}

// ── RENDER DASHBOARD ──────────────────────────────────────────────────────────
function renderDashboard() {
  const installHtml = deferredInstall ? `
    <div class="install-banner" id="install-banner">
      <span><strong>Install Daily Brief</strong> — Add to your home screen</span>
      <button class="install-btn" onclick="doInstall()">Install</button>
      <button class="close-banner" onclick="this.closest('.install-banner').remove()">✕</button>
    </div>` : "";

  const kinnegad = weatherData.kinnegad;
  const dublin = weatherData.dublin;

  return `
    ${installHtml}
    <div class="dashboard">
      <div class="widget">
        <div class="widget-label">🌤️ Kinnegad</div>
        ${weatherWidget(kinnegad)}
      </div>
      <div class="widget">
        <div class="widget-label">🌤️ Dublin</div>
        ${weatherWidget(dublin)}
      </div>
      <div class="widget">
        <div class="widget-label">🌿 Pollen — Midlands</div>
        ${pollenWidget(pollenData)}
      </div>
      <div class="widget">
        <div class="widget-label">⚠️ Met Éireann Alerts</div>
        ${alertsWidget(alertsData)}
      </div>
      <div class="widget wide">
        <div class="widget-label">📊 Markets</div>
        ${marketsWidget(marketsData)}
      </div>
    </div>
    <div class="section-label">🇮🇪 Top Irish Stories</div>
    ${allArticles.filter(a=>a.cat==="irish").slice(0,4).map((a,i)=>articleHTML(a,"d-irish-"+i)).join("")}
    <div class="section-label">🌍 Top World Stories</div>
    ${allArticles.filter(a=>a.cat==="world").slice(0,3).map((a,i)=>articleHTML(a,"d-world-"+i)).join("")}
    <div class="section-label">🇲🇩 Moldova</div>
    ${allArticles.filter(a=>a.cat==="moldova").slice(0,3).map((a,i)=>articleHTML(a,"d-mol-"+i)).join("")}
  `;
}

// ── RENDER NEWS ───────────────────────────────────────────────────────────────
function renderNews(tab) {
  let list = tab === "all" ? allArticles : allArticles.filter(a=>a.cat===tab);
  if (!list.length) return `<div class="error-state"><div class="error-msg">No articles loaded for this category.<br>Try refreshing.</div><button class="retry-btn" onclick="refreshAll()">Refresh</button></div>`;
  if (tab === "all") {
    let html = "";
    ["irish","world","politics","economics","finance","moldova"].forEach(cat => {
      const items = list.filter(a=>a.cat===cat).slice(0,5);
      if (!items.length) return;
      html += `<div class="section-label">${CAT_LABEL[cat]}</div>`;
      html += items.map((a,i)=>articleHTML(a,cat+i)).join("");
    });
    return html;
  }
  return list.slice(0,25).map((a,i)=>articleHTML(a,tab+i)).join("");
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById("main-content");
  if (currentTab === "dashboard") {
    el.innerHTML = renderDashboard();
  } else {
    el.innerHTML = renderNews(currentTab);
  }
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(btn) {
  currentTab = btn.dataset.tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render();
}

// ── INSTALL ───────────────────────────────────────────────────────────────────
function doInstall() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(()=>{ document.getElementById("install-banner")?.remove(); });
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  document.getElementById("main-content").innerHTML = `<div class="loading-state"><span class="mini-loader"></span>Refreshing your briefing…</div>`;

  // Load everything in parallel
  const [kinnegad, dublin, pollen, alerts, markets, ...feedResults] = await Promise.all([
    fetchWeather(53.4583, -7.0967, "Kinnegad"),
    fetchWeather(53.3498, -6.2603, "Dublin"),
    fetchPollen(),
    fetchAlerts(),
    fetchMarkets(),
    ...FEEDS.map(fetchFeed)
  ]);

  weatherData = { kinnegad, dublin };
  pollenData = pollen;
  alertsData = alerts;
  marketsData = markets;

  allArticles = [];
  feedResults.forEach(items => allArticles.push(...items));
  // deduplicate
  const seen = new Set();
  allArticles = allArticles.filter(a => {
    const k = a.title.slice(0,60).toLowerCase();
    if (seen.has(k)) return false; seen.add(k); return true;
  });
  allArticles.sort((a,b)=>new Date(b.date)-new Date(a.date));

  btn.classList.remove("spinning");
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
const d = new Date();
document.getElementById("app-date").textContent = d.toLocaleDateString("en-IE", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

refreshAll();
</script>
</body>
</html>
